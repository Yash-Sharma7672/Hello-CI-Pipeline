name: Advanced CI Pipeline

on:
  push:
    branches: [main]
  pull_request:

jobs:

  lint:
    name: Lint Code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install flake8

      - name: Run lint
        run: flake8 .

  test:
    name: Run Tests (Matrix)
    runs-on: ubuntu-latest
    needs: lint   # 🔥 dependency

    strategy:
      matrix:
        python-version: [3.8, 3.9, 3.10]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: pip-${{ matrix.python-version }}-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest

  build:
    name: Build Artifact
    runs-on: ubuntu-latest
    needs: test   # 🔥 runs only if all matrix tests pass

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Create artifact
        run: |
          mkdir build
          cp -r app build/

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: app-build
          path: build/